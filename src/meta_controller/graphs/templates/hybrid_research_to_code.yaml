template_name: hybrid_research_to_code
nodes:
  - id: research_planner
    role: research_planner
    runtime: claude_sdk
    tools: [read_only, web]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 3500
    timeout_seconds: 240
    retry_limit: 1
    description: structure the hybrid workflow
  - id: literature_scout
    role: literature_scout
    runtime: claude_sdk
    tools: [web, paper_search, pdf]
    permission_mode: read_only
    model_tier: fast
    budget_tokens: 3000
    timeout_seconds: 240
    retry_limit: 1
    description: gather research evidence
  - id: paper_analyst
    role: paper_analyst
    runtime: claude_sdk
    tools: [pdf, read_only]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 3500
    timeout_seconds: 300
    retry_limit: 1
    description: distill literature insights
  - id: hypothesis_generator
    role: hypothesis_generator
    runtime: claude_sdk
    tools: [read_only]
    permission_mode: read_only
    model_tier: strong
    budget_tokens: 4000
    timeout_seconds: 300
    retry_limit: 1
    description: define approach and constraints
  - id: experiment_designer
    role: experiment_designer
    runtime: claude_sdk
    tools: [python, repo]
    permission_mode: read_only
    model_tier: strong
    budget_tokens: 4500
    timeout_seconds: 360
    retry_limit: 1
    description: design evaluation plan
  - id: implementer
    role: implementer
    runtime: claude_sdk
    tools: [filesystem, patch, python]
    permission_mode: edit
    model_tier: strong
    budget_tokens: 6000
    timeout_seconds: 480
    retry_limit: 2
    description: build the first prototype scaffold
  - id: test_runner
    role: test_runner
    runtime: claude_sdk
    tools: [bash, pytest]
    permission_mode: execute
    model_tier: balanced
    budget_tokens: 3000
    timeout_seconds: 300
    retry_limit: 1
    description: run smoke validation
  - id: research_reviewer
    role: research_reviewer
    runtime: claude_sdk
    tools: [read_only]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 3000
    timeout_seconds: 240
    retry_limit: 1
    description: judge the full hybrid output
edges:
  - source: research_planner
    target: literature_scout
  - source: literature_scout
    target: paper_analyst
  - source: paper_analyst
    target: hypothesis_generator
  - source: hypothesis_generator
    target: experiment_designer
  - source: experiment_designer
    target: implementer
  - source: implementer
    target: test_runner
  - source: test_runner
    target: research_reviewer
loopbacks:
  - source: research_reviewer
    target: implementer
    condition: prototype_needs_revision
retry_rules:
  - node_id: implementer
    max_retries: 2
    trigger: failed
stop_rules:
  - condition: reviewer_accept
    action: accept
budget_policy:
  max_total_tokens: 26000
  max_total_cost_usd: 18
