template_name: research_survey_synthesis
nodes:
  - id: research_planner
    role: research_planner
    runtime: claude_sdk
    tools: [read_only, web]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 4000
    timeout_seconds: 240
    retry_limit: 1
    description: structure the research workflow
  - id: literature_scout
    role: literature_scout
    runtime: claude_sdk
    tools: [web, paper_search, pdf]
    permission_mode: read_only
    model_tier: fast
    budget_tokens: 3000
    timeout_seconds: 240
    retry_limit: 1
    description: gather candidate literature
  - id: paper_analyst
    role: paper_analyst
    runtime: claude_sdk
    tools: [pdf, read_only]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 4000
    timeout_seconds: 360
    retry_limit: 1
    description: analyze key papers
  - id: hypothesis_generator
    role: hypothesis_generator
    runtime: claude_sdk
    tools: [read_only]
    permission_mode: read_only
    model_tier: strong
    budget_tokens: 4000
    timeout_seconds: 300
    retry_limit: 1
    description: synthesize research directions
  - id: research_reviewer
    role: research_reviewer
    runtime: claude_sdk
    tools: [read_only]
    permission_mode: read_only
    model_tier: balanced
    budget_tokens: 3000
    timeout_seconds: 240
    retry_limit: 1
    description: critique the synthesized output
edges:
  - source: research_planner
    target: literature_scout
  - source: literature_scout
    target: paper_analyst
  - source: paper_analyst
    target: hypothesis_generator
  - source: hypothesis_generator
    target: research_reviewer
loopbacks:
  - source: research_reviewer
    target: hypothesis_generator
    condition: synthesis_incomplete
retry_rules:
  - node_id: literature_scout
    max_retries: 1
    trigger: failed
stop_rules:
  - condition: reviewer_accept
    action: accept
budget_policy:
  max_total_tokens: 18000
  max_total_cost_usd: 12
